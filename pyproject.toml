[tool.black]
line-length = 88
target-version = ["py312"]
extend-exclude = '''
(
  ^/(
    \.git
    | \.hg
    | \.mypy_cache
    | \.nox
    | \.pytest_cache
    | \.ruff_cache
    | \.tox
    | \.venv
    | \.vscode
    | __pycache__
    | archive
    | artifacts
    | db_schemas
    | docs
    | migrations
    | node_modules
    | secrets
    | venv
    | viewer
  )/
)
'''

[tool.isort]
profile = "black"
py_version = 312
line_length = 88
multi_line_output = 3
include_trailing_comma = true
use_parentheses = true
ensure_newline_before_comments = true
skip_gitignore = true
extend_skip = [
  ".git",
  ".hg",
  ".mypy_cache",
  ".nox",
  ".pytest_cache",
  ".ruff_cache",
  ".tox",
  ".venv",
  ".vscode",
  "__pycache__",
  "archive",
  "artifacts",
  "db_schemas",
  "docs",
  "migrations",
  "node_modules",
  "secrets",
  "venv",
  "viewer",
]

