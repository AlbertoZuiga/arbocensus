# Heavy infra shared by every worktree: one Postgres (external volume) and one
# OSRM (heavy map + matrix cache living in that Postgres). Runs under the fixed
# compose project `arbocensus`, so whichever worktree runs `make up`
# first brings it up and the rest attach. Two `db` services on the external
# `arbocensus_postgres_data` volume WAL-PANIC — hence a single fixed project.
#
# App services (backend/frontend/celery/redis) are per-worktree and live in
# docker-compose.yml. See docs/SHARED_DB_WORKTREES.md.
#
# Not used directly — driven by `make up` / `make shared-down`.

services:
  db:
    image: postgis/postgis:15-3.3
    platform: linux/amd64
    env_file:
      - .env
    environment:
      POSTGRES_DB: arbocensus
      POSTGRES_USER: arbocensus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - arbocensus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbocensus"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_HOST_PORT:-5433}:5432"

  osrm:
    image: osrm/osrm-backend
    platform: linux/amd64
    volumes:
      - ./data/osm:/data
    command: >
      sh -c "
        if [ ! -f /data/chile-latest.osrm ]; then
          echo 'Processing OSM data (first run, ~10-15 min)...' &&
          osrm-extract -p /opt/foot.lua /data/chile-latest.osm.pbf &&
          osrm-partition /data/chile-latest.osrm &&
          osrm-customize /data/chile-latest.osrm;
        fi &&
        osrm-routed --algorithm mld /data/chile-latest.osrm --max-table-size 5000 --port 5000
      "
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/5000; printf 'GET /nearest/v1/foot/-70.65,-33.45 HTTP/1.0\\r\\n\\r\\n' >&3; grep -q '\"code\":\"Ok\"' <&3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  arbocensus_postgres_data:
    external: true
