# Per-worktree app services (backend + frontend + celery + redis). The heavy
# infra (db + osrm) is NOT here: it is shared across worktrees under the fixed
# `arbocensus` project — see docker-compose.shared.yml and the Makefile.
# One postgres process ever → no WAL PANIC on the external volume.
#
# Redis + celery are NOT shared: a shared broker would let one worktree's worker
# steal tasks enqueued by another (and run the wrong code against the shared db).
# Each worktree gets its own redis on a PRIVATE network; backend/celery also join
# the shared network to reach db/osrm by service name. Because the shared infra
# carries no redis, `redis` resolves unambiguously to this worktree's instance.
#
# RUN_MIGRATIONS/SEED_DEV are off: the shared db is migrated + seeded once, on
# first bring-up. Use `make up`, which also brings the shared infra up.

x-backend-env: &backend-env
  DATABASE_URL: postgis://arbocensus:${DB_PASSWORD}@db/arbocensus
  REDIS_URL: redis://redis:6379/0
  OSRM_URL: http://osrm:5000
  SECRET_KEY: ${DJANGO_SECRET_KEY}
  DEBUG: "True"
  RUN_MIGRATIONS: "false"
  SEED_DEV: "false"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment: *backend-env
    volumes:
      - ./backend:/app
      # Sweep/audit write under BASE_DIR.parent (container root); paths like
      # `docs/experiments/foo.csv` land in /docs → persisted to this worktree.
      - ./docs:/docs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - default
      - shared
    command: python manage.py runserver 0.0.0.0:8000

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment: *backend-env
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app
      - ./docs:/docs
    networks:
      - default
      - shared
    command: celery -A config worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8000}/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    command: npm run dev -- --host

networks:
  # Private per-worktree network — carries redis (and frontend). Auto-named
  # <project>_default, so each worktree's redis is isolated.
  default: {}
  # Shared heavy infra (db + osrm), owned by the fixed `arbocensus` project.
  shared:
    external: true
    name: arbocensus_default

volumes:
  redis_data:
