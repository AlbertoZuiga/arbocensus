services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: arbocensus
      POSTGRES_USER: arbocensus
      POSTGRES_PASSWORD: arbocensus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arbocensus"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - ./src:/src
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://arbocensus:arbocensus@db:5432/arbocensus
      DJANGO_SETTINGS_MODULE: config.settings.development
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      PYTHONPATH: /src
      OSRM_BASE_URL: http://osrm:5000

  osrm:
    image: osrm/osrm-backend
    platform: linux/amd64
    ports:
      - "5501:5000"
    volumes:
      - ./data:/data
    command: >
      osrm-routed --algorithm mld /data/chile-latest.osrm

volumes:
  postgres_data:
