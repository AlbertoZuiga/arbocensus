services:
  bbox_selector:
    build: .
    container_name: bbox_selector_local
    env_file:
      - .env
    ports:
      - ${HOST_PORT:-5000}:5000
    volumes:
      - ./:/app:delegated
    # Run with the same command as the Dockerfile (local dev)
    command: ["python", "app.py"]
    restart: unless-stopped
