<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seleccionar Bounding Box</title>
    <style>
      html, body, #map { height: 100%; margin: 0; padding: 0; }
      #panel { position: absolute; z-index: 5; background: rgba(255,255,255,0.9); padding: 8px; margin: 8px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="panel">
      <strong>Instrucciones:</strong> Dibuje un rectángulo en el mapa. Al soltar, las coordenadas se guardan en `saved_bbox.json`.
      <div id="status"></div>
    </div>
    <div id="map"></div>

    <script src="https://maps.googleapis.com/maps/api/js?key={{ api_key }}&libraries=drawing"></script>
    <script>
      let map;
      let drawingManager;
      let currentRect = null;
      let markers = [];

      function clearMarkers(){
        for(const m of markers) m.setMap(null);
        markers = [];
      }

      function fetchTreesForBounds(bounds){
        const ne = bounds.getNorthEast();
        const sw = bounds.getSouthWest();
        const params = new URLSearchParams({
          north: ne.lat(), south: sw.lat(), east: ne.lng(), west: sw.lng(), max: 500
        });
        document.getElementById('status').innerText = 'Cargando árboles...';
          return fetch('/trees?' + params.toString())
            .then(r => r.json())
            .then(j => {
              if (!j.ok) { document.getElementById('status').innerText = 'Error cargando árboles: ' + (j.error||''); return j; }
              clearMarkers();
              for(const t of j.trees){
                const treeSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"><circle cx="16" cy="12" r="8" fill="%2394d93b"/><rect x="14" y="18" width="4" height="8" fill="%238b5a2b"/></svg>';
                const m = new google.maps.Marker({
                  position: { lat: t.lat, lng: t.lng },
                  map: map,
                  title: 'Árbol',
                  icon: {
                    url: 'data:image/svg+xml;utf-8,' + treeSvg,
                    scaledSize: new google.maps.Size(24, 24)
                  }
                });
                const info = document.createElement('div');
                info.innerHTML = '<div><strong>Árbol</strong><br/>' + (t.meta && t.meta.tree_id ? ('ID: ' + t.meta.tree_id + '<br/>') : '') + (t.meta && t.meta.id ? ('sample: ' + t.meta.id) : '') + '</div>';
                const infowindow = new google.maps.InfoWindow({ content: info });
                m.addListener('click', () => infowindow.open(map, m));
                markers.push(m);
              }
              document.getElementById('status').innerText = 'Árboles mostrados: ' + j.trees.length;
              return j;
            })
            .catch(err => { document.getElementById('status').innerText = 'Error cargando árboles: ' + err; return { ok: false, error: String(err), trees: [] }; });
      }

      function initMap(){
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: -33.45, lng: -70.6667 },
          zoom: 12,
        });

        drawingManager = new google.maps.drawing.DrawingManager({
          drawingMode: google.maps.drawing.OverlayType.RECTANGLE,
          drawingControl: true,
          drawingControlOptions: { position: google.maps.ControlPosition.TOP_CENTER, drawingModes: [google.maps.drawing.OverlayType.RECTANGLE] },
          rectangleOptions: { editable: true, draggable: true }
        });
        drawingManager.setMap(map);

        google.maps.event.addListener(drawingManager, 'overlaycomplete', function(event) {
          if (currentRect) { currentRect.setMap(null); }
          currentRect = event.overlay;
          // when created or edited, fetch trees for the rect and then save bbox + trees
          fetchTreesForBounds(currentRect.getBounds()).then(j => {
            const trees = (j && j.trees) ? j.trees : [];
            saveRectBounds(currentRect.getBounds(), trees);
          });

          // when edited, save again (debounce a bit?) - keep simple: fetch then save
          google.maps.event.addListener(currentRect, 'bounds_changed', function(){
            fetchTreesForBounds(currentRect.getBounds()).then(j => {
              const trees = (j && j.trees) ? j.trees : [];
              saveRectBounds(currentRect.getBounds(), trees);
            });
          });
        });

        // When the map becomes idle (after pan/zoom), fetch visible trees
        map.addListener('idle', function(){
          fetchTreesForBounds(map.getBounds());
        });
      }

      function saveRectBounds(bounds, trees){
        const ne = bounds.getNorthEast();
        const sw = bounds.getSouthWest();
        const payload = {
          north: ne.lat(),
          east: ne.lng(),
          south: sw.lat(),
          west: sw.lng()
        };

        // if caller provided trees, include them
        if (trees && Array.isArray(trees)) {
          payload.trees = trees;
        }

        document.getElementById('status').innerText = 'Guardando...';

        fetch('/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).then(r => r.json()).then(j => {
          if (j.ok) document.getElementById('status').innerText = 'Guardado en: ' + j.path;
          else document.getElementById('status').innerText = 'Error guardando: ' + (j.error||'');
        }).catch(err => {
          document.getElementById('status').innerText = 'Error: ' + err;
        });
      }

      window.onload = initMap;
    </script>
  </body>
</html>
