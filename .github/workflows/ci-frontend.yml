name: Frontend

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci-frontend.yml'

  frontend:
    needs: changes
    if: (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        if: ${{ !cancelled() }}
        run: npm run test

      - name: Build
        if: ${{ !cancelled() }}
        run: npm run build

  frontendExpected:
    runs-on: ubuntu-latest
    needs: [frontend]
    if: always()
    steps:
      - name: Check frontend result
        run: |
          result="${{ needs.frontend.result }}"
          if [[ "$result" == "success" || "$result" == "skipped" ]]; then
            exit 0
          else
            exit 1
          fi
