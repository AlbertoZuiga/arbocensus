name: Backend

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          token: ''
          filters: |
            backend:
              - 'backend/**'
              - 'tools/**'
              - 'scripts/**'
              - 'pyproject.toml'
              - '.python-version'
              - '.github/workflows/ci-backend.yml'

  lint:
    needs: changes
    if: (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read Python version
        id: pyver
        run: echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/dev-requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/dev-requirements.txt ]; then pip install -r backend/dev-requirements.txt; fi
          if [ -f tools/requirements-dev.txt ]; then pip install -r tools/requirements-dev.txt; fi
          pip install -r scripts/requirements-figures.txt
          pip install ruff==0.5.0 pyright==1.1.407

      - name: Lint with Ruff
        run: ruff check .

      - name: Format check with Ruff
        if: ${{ !cancelled() }}
        run: ruff format . --check

      - name: Type check with Pyright
        if: ${{ !cancelled() }}
        run: pyright .

  test:
    needs: changes
    if: (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') && (github.event_name != 'pull_request' || !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: arbocensus
          POSTGRES_USER: arbocensus
          POSTGRES_PASSWORD: arbocensus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arbocensus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret
      DB_NAME: arbocensus
      DB_USER: arbocensus
      DB_PASSWORD: arbocensus
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read Python version
        id: pyver
        run: echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/dev-requirements.txt

      - name: Install GDAL system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/dev-requirements.txt ]; then pip install -r backend/dev-requirements.txt; fi
          if [ -f tools/requirements-dev.txt ]; then pip install -r tools/requirements-dev.txt; fi
          pip install -r scripts/requirements-figures.txt

      - name: Run tests with Pytest
        working-directory: backend
        run: pytest -v

      # The figure renderer is standalone (no Django, no database): it runs from the
      # repo root, outside backend's pytest.ini.
      - name: Run figure renderer tests
        if: ${{ !cancelled() }}
        run: pytest scripts/tests -v

  backendExpected:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: always()
    steps:
      - name: Check backend result
        run: |
          lint="${{ needs.lint.result }}"
          test="${{ needs.test.result }}"
          if [[ ("$lint" == "success" || "$lint" == "skipped") && ("$test" == "success" || "$test" == "skipped") ]]; then
            exit 0
          else
            exit 1
          fi
