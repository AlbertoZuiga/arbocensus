name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read Python version
        id: pyver
        run: echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/dev-requirements.txt ]; then pip install -r backend/dev-requirements.txt; fi
          if [ -f tools/requirements-dev.txt ]; then pip install -r tools/requirements-dev.txt; fi
          pip install ruff==0.5.0 pyright==1.1.407

      - name: Lint with Ruff
        run: ruff check .

      - name: Format check with Ruff
        run: ruff format . --check

      - name: Type check with Pyright
        run: pyright .

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint commit messages
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: arbocensus
          POSTGRES_USER: arbocensus
          POSTGRES_PASSWORD: arbocensus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U arbocensus"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-test-secret
      DB_NAME: arbocensus
      DB_USER: arbocensus
      DB_PASSWORD: arbocensus
      DB_HOST: localhost
      DB_PORT: 5432

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read Python version
        id: pyver
        run: echo "PYTHON_VERSION=$(cat .python-version)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install GDAL system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/dev-requirements.txt ]; then pip install -r backend/dev-requirements.txt; fi
          if [ -f tools/requirements-dev.txt ]; then pip install -r tools/requirements-dev.txt; fi

      - name: Run tests with Pytest
        working-directory: backend
        run: pytest -v

